# packages/robot-data-recorder/pixi.toml
#
# Active pixi env for the recorder package. Includes full hardware deps
# (pyrealsense2 + lerobot + stable-worldmodel) so `pixi run robot-data-record`
# works for real D435 + SO-101 sessions in `--format=dual` (Parquet + HDF5).
#
# In monorepo mode the workspace-root pixi.toml installs the same deps. This
# package-local env is used when invoking from inside this directory.

[workspace]
name = "robot-data-recorder"
channels = ["conda-forge", "nvidia"]
platforms = ["linux-64"]

[system-requirements]
cuda = "12"

[dependencies]
python = ">=3.10,<3.13"
pip = "*"
numpy = "*"
h5py = "*"
pyyaml = "*"
# Real D435 camera support
pyrealsense2 = "*"
# Torch via conda for CUDA compat (matches workspace root pixi.toml)
pytorch = ">=2.2.1,<2.8.0"
torchvision = ">=0.21.0,<0.23.0"
setuptools = ">=71,<81"
packaging = ">=24.2,<26.0"
# Cap fsspec to avoid pin conflict with datasets (lerobot transitive dep)
fsspec = "<=2025.9.0"

[pypi-dependencies]
robot-data-recorder = { path = ".", editable = true }
# lerobot intentionally NOT listed here. Recorder now lives inside the
# lerobot-isaac-training workspace as an editable sibling — install lerobot
# via the workspace's helper (extras: feetech, intelrealsense):
#   pixi run install-train-deps --policy
# LeWM HDF5 writer (hdf5 / dual format)
stable-worldmodel = "*"
# Live camera viewer (tkinter + Pillow)
pillow = "*"

[tasks]
record = "robot-data-record"
check = "robot-data-check"
view-cam = "robot-data-view"
test = "python -m pytest tests/ -q"

[feature.dev.dependencies]
pytest = "*"
hatchling = "*"

[environments]
default = ["dev"]
