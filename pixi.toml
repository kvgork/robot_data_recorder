# packages/lerobot-isaac-recorder/pixi.toml
# DORMANT in monorepo mode — only active after spinout via git subtree split.
# In monorepo mode the root pixi.toml governs all environments.

[workspace]
name = "lerobot-isaac-recorder"
channels = ["conda-forge"]
platforms = ["linux-64"]

[dependencies]
python = ">=3.10,<3.12"
pip = "*"

[pypi-dependencies]
lerobot-isaac-recorder = { path = ".", editable = true }

[feature.dev.dependencies]
pytest = "*"
hatchling = "*"
numpy = "*"
h5py = "*"
pyyaml = "*"

[environments]
default = ["dev"]
